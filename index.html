<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDrop Party PRO</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:95%;
max-width:420px;
padding:25px;
border-radius:25px;
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.65);
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
}

.title{
font-size:30px;
font-weight:800;
background: linear-gradient(90deg,#ff416c,#ff4b2b,#ff416c);
-webkit-background-clip:text;
color:transparent;
animation: glow 3s linear infinite;
background-size:200%;
}

@keyframes glow{0%{background-position:0%}100%{background-position:200%}}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:10px;
font-size:16px;
}

button{
border:none;
padding:14px;
margin-top:15px;
border-radius:15px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:active{transform:scale(.95)}

.add{background:#ff416c;color:white;width:60%}

.friend-chip{
display:inline-block;
padding:8px 14px;
margin:5px;
background:linear-gradient(45deg,#ff758c,#ff7eb3);
color:white;
border-radius:20px;
font-weight:600;
}

#wheel{
width:220px;
height:220px;
border-radius:50%;
border:8px solid white;
margin:20px auto;
transition:4s cubic-bezier(.17,.67,.26,1);
}

.pointer{
width:0;height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:25px solid black;
margin:auto;
}

.truth{background:linear-gradient(45deg,#00c6ff,#0072ff);color:white;width:40%}
.dare{background:linear-gradient(45deg,#ff416c,#ff4b2b);color:white;width:40%}

.question{font-size:20px;font-weight:700;margin-top:15px}

</style>
</head>

<body>

<div class="card">

<div class="title">🔥 DareDrop Party PRO</div>

<input id="name" placeholder="Friend name">
<button class="add" onclick="addFriend()">Add</button>

<div id="friends"></div>

<div class="pointer"></div>
<canvas id="wheel" width="220" height="220"></canvas>

<button class="add" onclick="spin()">🎡 Spin Friend</button>

<h2 id="player"></h2>

<select id="category">
<option value="funny">😂 Funny Dare</option>
<option value="romantic">❤️ Romantic Dare</option>
<option value="party">🔥 Party Dare</option>
</select>

<div>
<button class="truth" onclick="truth()">Truth</button>
<button class="dare" onclick="dare()">Dare</button>
</div>

<div class="question" id="question"></div>

</div>

<script>

let friends=[]
let selected=""
const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")
let angle=0

function drawWheel(){
if(!friends.length)return
let slice=2*Math.PI/friends.length
ctx.clearRect(0,0,220,220)

friends.forEach((f,i)=>{
ctx.beginPath()
ctx.moveTo(110,110)
ctx.arc(110,110,110,i*slice,(i+1)*slice)
ctx.fillStyle=`hsl(${i*360/friends.length},80%,65%)`
ctx.fill()

ctx.save()
ctx.translate(110,110)
ctx.rotate(i*slice+slice/2)
ctx.fillStyle="white"
ctx.font="bold 14px sans-serif"
ctx.fillText(f,50,5)
ctx.restore()
})
}

function addFriend(){
let name=document.getElementById("name").value
if(!name)return
friends.push(name)
document.getElementById("name").value=""

let chip=document.createElement("span")
chip.innerText=name
chip.className="friend-chip"
document.getElementById("friends").appendChild(chip)

drawWheel()
}

function spin(){
if(!friends.length)return
let rand=Math.floor(Math.random()*friends.length)
selected=friends[rand]

angle+=360*5 + (360/friends.length)*rand
canvas.style.transform=`rotate(${angle}deg)`

setTimeout(()=>{
document.getElementById("player").innerHTML="👉 "+selected
confetti()
},4000)
}

/* 100 TRUTHS */
const truths=[...Array(100)].map((_,i)=>"Truth question "+(i+1)+" — Tell something honest")

/* CATEGORY DARES */
const funny=[
"Talk like baby 1 min","Dance without music","Act monkey","Laugh loudly 30 sec",
"Do funny walk","Sing cartoon song","Make weird face","Talk backwards",
"Act teacher","Pretend robot"
]

const romantic=[
"Send heart emoji crush","Compliment player","Hold hand 10 sec","Say cheesy line",
"Give flying kiss","Say I miss you","Hug pillow","Romantic pose",
"Say love quote","Eye contact 20 sec"
]

const party=[
"Dance 30 sec","Shot water challenge","Pushups 10","Sing loud",
"Rap 20 sec","Spin 10 times","Jump 20","Funny selfie",
"Imitate celeb","Tell joke"
]

/* expand to 100 each */
while(funny.length<100)funny.push("Funny dare "+funny.length)
while(romantic.length<100)romantic.push("Romantic dare "+romantic.length)
while(party.length<100)party.push("Party dare "+party.length)

function truth(){
let q=truths[Math.floor(Math.random()*truths.length)]
document.getElementById("question").innerHTML="🔥 "+selected+": "+q
}

function dare(){
let cat=document.getElementById("category").value
let arr=cat=="funny"?funny:cat=="romantic"?romantic:party
let q=arr[Math.floor(Math.random()*arr.length)]
document.getElementById("question").innerHTML="😈 "+selected+": "+q
}

</script>

</body>
</html>
