<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🔥 DareDrop Party Pro</title>

    <style>
        /* CSS ਵਿੱਚ ਕੋਈ ਵੱਡੀ ਤਬਦੀਲੀ ਨਹੀਂ, ਸਿਰਫ ਕੁਝ ਸੁਧਾਰ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 25px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        button:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        #friendList span {
            display: inline-block;
            background: #fdf2f4;
            color: #ff416c;
            padding: 5px 12px;
            margin: 4px;
            border-radius: 15px;
            font-size: 13px;
            border: 1px solid #ffccd5;
        }

        /* ਟਾਸਕ ਦਾ ਸਟਾਈਲ ਥੋੜਾ ਬਿਹਤਰ ਕੀਤਾ */
        #taskDisplay {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #ff416c;
            margin: 15px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 DareDrop</h1>
    
    <select id="mode" onchange="toggleMode()">
        <option value="friend">Dosto Naal (Group)</option>
        <option value="self">Kalle (Solo)</option>
    </select>

    <div id="friendBox">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input id="friendInput" placeholder="Dost da naam..." style="flex:1; margin:0;">
            <button onclick="addFriend()" style="margin:0;">Add</button>
        </div>
        <div id="friendList"></div>
        <button id="spinBtn" onclick="spinFriend()" style="background:#4b6cb7; width: 100%;">🎡 Spin the Wheel</button>
    </div>

    <div id="selectedFriend" class="big">Taiyar Ho?</div>

    <div style="display:flex; gap: 10px;">
        <button id="truthBtn" onclick="getTruth()" style="background:#f093fb; color:black; flex:1;">🤫 Truth</button>
        <button id="dareBtn" onclick="getDare()" style="background:#5eead4; color:black; flex:1;">⚡ Dare</button>
    </div>

    <div id="taskDisplay">Click Truth or Dare to start!</div>

    <button onclick="share()" style="background:#25D366; width:100%;">📲 Share on WhatsApp</button>

    <div class="chat-section">
        <div id="chatLog"></div>
        <div style="display:flex; gap:5px;">
            <input id="chatInput" placeholder="Write something..." style="flex:1; margin:0;">
            <button onclick="addComment()" style="margin:0;">Send</button>
        </div>
    </div>
    
    <button class="reset-btn" onclick="resetGame()">Reset All</button>
</div>

<script>
let friends = JSON.parse(localStorage.getItem('dareDropFriends')) || [];
let currentFriend = "";
let isSpinning = false;

window.onload = () => {
    renderFriends();
    toggleMode();
};

function toggleMode() {
    const mode = document.getElementById('mode').value;
    const friendBox = document.getElementById('friendBox');
    if(mode === "self") {
        friendBox.style.display = "none";
        currentFriend = "ਤੁਸੀਂ";
        document.getElementById('selectedFriend').innerText = "ਤੁਹਾਡੀ ਵਾਰੀ! 🎲";
        enableTaskButtons(true);
    } else {
        friendBox.style.display = "block";
        currentFriend = "";
        document.getElementById('selectedFriend').innerText = "Spin ਕਰੋ!";
        enableTaskButtons(false);
    }
}

function enableTaskButtons(status) {
    document.getElementById('truthBtn').disabled = !status;
    document.getElementById('dareBtn').disabled = !status;
}

function addFriend() {
    let input = document.getElementById('friendInput');
    let name = input.value.trim();
    if(name && !friends.includes(name)) {
        friends.push(name);
        localStorage.setItem('dareDropFriends', JSON.stringify(friends));
        renderFriends();
        input.value = "";
    }
}

function renderFriends() {
    document.getElementById('friendList').innerHTML = friends.map(f => `<span>${f}</span>`).join("");
}

function spinFriend() {
    if(friends.length < 2) return alert("Add at least 2 friends!");
    if(isSpinning) return;

    isSpinning = true;
    enableTaskButtons(false);
    let counter = 0;
    let display = document.getElementById('selectedFriend');
    let spinBtn = document.getElementById('spinBtn');
    spinBtn.disabled = true;

    let interval = setInterval(() => {
        display.innerText = "🎲 " + friends[Math.floor(Math.random() * friends.length)];
        counter++;
        if(counter > 15) {
            clearInterval(interval);
            currentFriend = friends[Math.floor(Math.random() * friends.length)];
            display.innerText = "🔥 " + currentFriend;
            isSpinning = false;
            spinBtn.disabled = false;
            enableTaskButtons(true); // ਸਪਿਨ ਤੋਂ ਬਾਅਦ ਬਟਨ ਖੋਲ੍ਹੋ
            addLog(`ਵਾਰੀ ਆਈ: ${currentFriend}`, "task-log");
        }
    }, 80);
}

function getTruth() {
    const truths = ["Crush da naam?", "Last jhoot ki si?", "Phone password?", "Kade chori kiti?"];
    showTask("🤫 Truth: " + truths[Math.floor(Math.random()*truths.length)]);
}

function getDare() {
    const dares = ["Dance for 30s", "10 Pushups", "Prank call", "Funny selfie"];
    showTask("⚡ Dare: " + dares[Math.floor(Math.random()*dares.length)]);
}

function showTask(t) {
    document.getElementById('taskDisplay').innerText = t;
    addLog(`${currentFriend} -> ${t}`, "task-log");
    if(document.getElementById('mode').value === "friend") enableTaskButtons(false); // ਇੱਕ ਵਾਰ ਟਾਸਕ ਲੈਣ ਤੋਂ ਬਾਅਦ ਦੁਬਾਰਾ ਸਪਿਨ ਜ਼ਰੂਰੀ
}

function addComment() {
    let input = document.getElementById('chatInput');
    if(input.value.trim()) {
        addLog("💬: " + input.value, "");
        input.value = "";
    }
}

function addLog(text, className) {
    let log = document.getElementById('chatLog');
    let div = document.createElement("div");
    div.className = "chat-msg " + className;
    div.innerHTML = `<small>${new Date().toLocaleTimeString()}</small><br>${text}`;
    log.prepend(div);
}

function resetGame() {
    if(confirm("Sare friends delete kar diye?")) {
        friends = [];
        localStorage.clear();
        location.reload();
    }
}

function share() {
    let text = encodeURIComponent("Oye dekh mera task: " + document.getElementById('taskDisplay').innerText);
    window.open("https://wa.me/?text=" + text);
}
</script>
</body>
</html>
