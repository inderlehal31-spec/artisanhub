<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DareDrop Pro Party</title>
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00dbde;
            --success: #25D366;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 15px var(--primary); }

        .btn {
            width: 85%;
            padding: 14px;
            font-size: 1rem;
            margin: 8px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--primary), #fb406c);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255,0,85,0.4); }

        .quit-btn {
            background: transparent;
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            margin-top: 15px;
            width: 50%;
            font-size: 0.8rem;
        }

        input {
            padding: 14px 20px;
            width: 75%;
            border-radius: 25px;
            border: 2px solid var(--secondary);
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 10px;
            outline: none;
        }

        /* Spinner */
        .wheel-box {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fff;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #fff;
            z-index: 10;
        }

        .slice {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slice span {
            position: absolute;
            right: 20%;
            bottom: 35%;
            font-weight: bold;
            font-size: 12px;
            transform-origin: center;
            width: 70px;
            text-align: center;
        }

        .hidden { display: none; }

        .task-card {
            background: white;
            color: #111;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.4;
        }

        #pList { font-size: 0.9rem; color: var(--secondary); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">DareDrop 🎲</h1>

    <div id="modeMenu">
        <button class="btn" onclick="startMode('self')">Solo Challenge</button>
        <button class="btn" onclick="startMode('friends')">Party with Friends</button>
    </div>

    <div id="setup" class="hidden">
        <input type="text" id="playerName" placeholder="Player Name...">
        <button class="btn" style="width:auto" onclick="addPlayer()">Add</button>
        <div id="pList"></div>
        <button class="btn" id="startBtn" style="display:none" onclick="initGame()">Start Game</button>
    </div>

    <div id="gameSection" class="hidden">
        <div class="wheel-box">
            <div class="arrow"></div>
            <div id="wheel"></div>
        </div>
        <h2 id="statusText">Tap to Spin!</h2>
        <button class="btn" id="spinBtn" onclick="spinNow()">Spin Wheel</button>
    </div>

    <div id="categorySection" class="hidden">
        <h3>Select Vibe</h3>
        <button class="btn" onclick="pickCat('fun')">Fun 😄</button>
        <button class="btn" onclick="pickCat('extreme')" style="background: #e67e22;">Extreme 🔥</button>
    </div>

    <div id="truthDareSection" class="hidden">
        <h3 id="targetName"></h3>
        <button class="btn" onclick="showTask('truth')" style="background:#3498db">Truth 💡</button>
        <button class="btn" onclick="showTask('dare')" style="background:#27ae60">Dare ⚡</button>
    </div>

    <div id="resultBox" class="hidden">
        <div class="task-card" id="taskDisplay"></div>
        <button class="btn" id="shareWA" style="background:#25D366">WhatsApp Share 📱</button>
        <button class="btn" onclick="nextRound()" style="background:#7f8c8d">Next Round 🔄</button>
        <button class="btn quit-btn" onclick="location.reload()">Quit Game 🚪</button>
    </div>
</div>

<script>
    let players = [];
    let currentPlayer = "";
    let selectedCat = "";
    let mode = "";
    let currentRotation = 0;
    const colors = ["#f32121", "#21f321", "#2121f3", "#f3f321", "#f321f3", "#21f3f3", "#ffa500", "#800080"];

    const tasks = {
        fun: { truth: ["Crush da naam?", "Sabh ton vaddi galti?"], dare: ["10 sec funny dance", "Act like a monkey"] },
        extreme: { truth: ["Ever cheated in exam?", "Darkest secret?"], dare: ["Call your crush now", "Post a silly photo"] }
    };

    function startMode(m) {
        mode = m;
        document.getElementById('modeMenu').classList.add('hidden');
        if(m === 'self') {
            currentPlayer = "You";
            showCategories();
        } else {
            document.getElementById('setup').classList.remove('hidden');
        }
    }

    function addPlayer() {
        let name = document.getElementById('playerName').value.trim();
        if(name) {
            players.push(name);
            document.getElementById('playerName').value = "";
            document.getElementById('pList').innerText = "Players: " + players.join(" | ");
            if(players.length >= 2) document.getElementById('startBtn').style.display = "block";
        }
    }

    function initGame() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('gameSection').classList.remove('hidden');
        drawWheel();
    }

    function drawWheel() {
        const wheel = document.getElementById('wheel');
        wheel.innerHTML = "";
        const angle = 360 / players.length;
        players.forEach((p, i) => {
            const slice = document.createElement('div');
            slice.className = 'slice';
            slice.style.backgroundColor = colors[i % colors.length];
            slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
            
            const span = document.createElement('span');
            span.style.transform = `skewY(-${90 - angle}deg) rotate(${angle/2}deg)`;
            span.innerText = p;
            slice.appendChild(span);
            wheel.appendChild(slice);
        });
    }

    function spinNow() {
        const wheel = document.getElementById('wheel');
        const extraDeg = Math.floor(2000 + Math.random() * 3000);
        currentRotation += extraDeg;
        wheel.style.transform = `rotate(${currentRotation}deg)`;
        
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('statusText').innerText = "Spinning...";

        setTimeout(() => {
            const actualDeg = currentRotation % 360;
            const sliceSize = 360 / players.length;
            const index = Math.floor((360 - (actualDeg % 360)) / sliceSize) % players.length;
            currentPlayer = players[index];
            
            document.getElementById('statusText').innerText = "Target: " + currentPlayer;
            setTimeout(() => {
                showCategories();
            }, 1000);
        }, 4000);
    }

    function showCategories() {
        document.getElementById('gameSection').classList.add('hidden');
        document.getElementById('categorySection').classList.remove('hidden');
    }

    function pickCat(c) {
        selectedCat = c;
        document.getElementById('categorySection').classList.add('hidden');
        document.getElementById('targetName').innerText = currentPlayer + "'s Turn";
        document.getElementById('truthDareSection').classList.remove('hidden');
    }

    function showTask(type) {
        const list = tasks[selectedCat][type];
        const task = list[Math.floor(Math.random() * list.length)];
        
        document.getElementById('truthDareSection').classList.add('hidden');
        const box = document.getElementById('resultBox');
        const display = document.getElementById('taskDisplay');
        
        display.innerHTML = `<small>${currentPlayer}</small><br>${task}`;
        box.classList.remove('hidden');

        // WhatsApp Link Fix
        document.getElementById('shareWA').onclick = () => {
            const text = encodeURIComponent(`🎲 *DareDrop Party* \n\n👤 Player: ${currentPlayer}\n🔥 Task: ${task}\n\nKhedo te mauj karo!`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        };
    }

    function nextRound() {
        document.getElementById('resultBox').classList.add('hidden');
        if(mode === 'self') {
            showCategories();
        } else {
            document.getElementById('gameSection').classList.remove('hidden');
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('statusText').innerText = "Next Player!";
        }
    }
</script>

</body>
</html>
