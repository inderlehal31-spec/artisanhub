<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DareDrop Super Party</title>
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #4facfe;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #4facfe, #00f2fe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid var(--glass); border-radius: 30px;
            padding: 25px; width: 90%; max-width: 450px; margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
        }

        .game-btn {
            background: white; color: var(--primary); border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s; margin: 10px;
        }

        .game-btn:active { transform: scale(0.95); }

        /* Menu Overlay */
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
        }

        .menu-content { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 300px; }
        .menu-item {
            padding: 15px; color: #333; font-weight: bold;
            border-bottom: 1px solid #eee; cursor: pointer; text-align: center;
        }

        /* Parchiyan Styling */
        .chit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .chit {
            background: #fff; color: #333; height: 80px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: rotate(-2deg);
        }
        .chit:nth-child(even) { transform: rotate(2deg); }

        .chat-box {
            background: rgba(0, 0, 0, 0.3); border-radius: 15px;
            height: 100px; overflow-y: auto; padding: 10px;
            text-align: left; font-size: 13px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none; }
        .highlight { color: #fdfc47; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="margin-top: 20px;">🔥 DareDrop Super Pro</h1>

    <button class="game-btn" onclick="toggleMenu()">🎮 Select Game Mode</button>

    <div class="main-card">
        <h2 id="gameTitle">Welcome!</h2>
        <p id="gameDesc" style="opacity: 0.8;">Select a game mode to start.</p>

        <div id="sectionTruth" class="hidden">
            <div id="selectedPlayer" class="highlight">🎲 Spin First!</div>
            <button onclick="spinPlayer()" class="game-btn" style="background:var(--secondary); color:white;">🎡 Spin Friend</button>
            <div style="margin: 15px 0;">
                <button onclick="getTask('truth')" class="game-btn" style="background:#00b09b; color:white; width:100px;">Truth</button>
                <button onclick="getTask('dare')" class="game-btn" style="background:#ff4b2b; color:white; width:100px;">Dare</button>
            </div>
            <div id="taskDisplay" style="padding: 10px; font-style: italic;"></div>
        </div>

        <div id="sectionParchiyan" class="hidden">
            <div id="parchiPlayer" class="highlight">Friend's Turn</div>
            <p>Click a chit to "Pass" it!</p>
            <div class="chit-grid">
                <div class="chit" onclick="passChit(1)">📄 <br> Chit 1</div>
                <div class="chit" onclick="passChit(2)">📄 <br> Chit 2</div>
                <div class="chit" onclick="passChit(3)">📄 <br> Chit 3</div>
                <div class="chit" onclick="passChit(4)">📄 <br> Chit 4</div>
            </div>
        </div>

        <div id="sectionAntakshari" class="hidden">
            <div id="letterBox" class="highlight" style="font-size: 50px;">?</div>
            <button onclick="generateLetter()" class="game-btn">🔄 Get Next Letter</button>
            <p>Sing a song starting with this letter!</p>
        </div>

        <div class="chat-box" id="chat">
            <div><b>System:</b> Party is ready! 🥳</div>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()">
        <div class="menu-content" onclick="event.stopPropagation()">
            <div class="menu-item" onclick="loadGame('Truth & Dare')">🔥 Truth or Dare</div>
            <div class="menu-item" onclick="loadGame('Antakshari')">🎤 Antakshari</div>
            <div class="menu-item" onclick="loadGame('Parchiyan')">🃏 Parchiyan (4 Chits)</div>
            <div class="menu-item" onclick="toggleMenu()" style="color:red; border:none;">❌ Close</div>
        </div>
    </div>

    <script>
        let friends = ["Rohan", "Deep", "Sonia", "Preet"];
        let currentFriendIndex = 0;

        function toggleMenu() {
            const menu = document.getElementById('menuOverlay');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function loadGame(game) {
            // Hide all
            document.getElementById('sectionTruth').classList.add('hidden');
            document.getElementById('sectionParchiyan').classList.add('hidden');
            document.getElementById('sectionAntakshari').classList.add('hidden');
            
            document.getElementById('gameTitle').innerText = game;
            
            if(game === 'Truth & Dare') {
                document.getElementById('sectionTruth').classList.remove('hidden');
                document.getElementById('gameDesc').innerText = "Classical Fun!";
            } else if(game === 'Parchiyan') {
                document.getElementById('sectionParchiyan').classList.remove('hidden');
                document.getElementById('gameDesc').innerText = "Pass the chits to collect same names!";
                document.getElementById('parchiPlayer').innerText = friends[0];
            } else if(game === 'Antakshari') {
                document.getElementById('sectionAntakshari').classList.remove('hidden');
                document.getElementById('gameDesc').innerText = "Sing till you win!";
            }
            toggleMenu();
            addChat("Game mode: " + game);
        }

        // Truth Dare Logic
        function spinPlayer() {
            let p = friends[Math.floor(Math.random() * friends.length)];
            document.getElementById('selectedPlayer').innerText = "👉 " + p;
            addChat(p + " is the chosen one!");
        }

        function getTask(type) {
            const truths = ["Biggest crush?", "Secret habit?", "Last lie?", "Phone password?"];
            const dares = ["Do 10 pushups", "Sing a song", "Act like a monkey", "Call your crush"];
            let list = type === 'truth' ? truths : dares;
            let t = list[Math.floor(Math.random() * list.length)];
            document.getElementById('taskDisplay').innerText = t;
        }

        // Parchiyan Logic
        function passChit(n) {
            currentFriendIndex = (currentFriendIndex + 1) % friends.length;
            let nextPlayer = friends[currentFriendIndex];
            document.getElementById('parchiPlayer').innerText = nextPlayer;
            addChat(`Chit ${n} passed to ${nextPlayer} 🔄`);
        }

        // Antakshari Logic
        function generateLetter() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let randomLetter = letters[Math.floor(Math.random() * letters.length)];
            document.getElementById('letterBox').innerText = randomLetter;
            addChat("New Letter: " + randomLetter);
        }

        function addChat(msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Log:</b> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
