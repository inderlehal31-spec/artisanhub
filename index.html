<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Showcase | Authentic Handcrafted</title>
    <style>
        /* CSS Styling */
        :root { --bg: #F5F2ED; --text: #4A3F35; --accent: #C19A6B; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Hero Section */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; color: var(--text); }
        .cta-btn { padding: 12px 30px; border: 1px solid var(--text); background: transparent; cursor: pointer; margin: 10px; transition: 0.3s; }
        .cta-btn:hover { background: var(--text); color: #fff; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #fff; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }

        /* Footer */
        footer { text-align: center; padding: 40px; background: #e5e0da; }
        
        @media (max-width: 600px) { .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Discover Authentic Handcrafted Creations</h1>
        <p>A global platform where artisans showcase their handmade masterpieces.</p>
        <div>
            <button class="cta-btn">Explore Artisans</button>
            <button class="cta-btn">Join as Artisan</button>
        </div>
    </section>

    <div class="grid" id="productGrid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1578749556568-bc5c40e6d561?w=500" alt="Wood Craft">
            <h3>Hand-carved Oak Bowl</h3>
            <p><strong>Artisan:</strong> John Doe</p>
            <button class="cta-btn">View Details</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1577720580479-7d839d829c73?w=500" alt="Pottery">
            <h3>Ceramic Vase</h3>
            <p><strong>Artisan:</strong> Sarah Smith</p>
            <button class="cta-btn">View Details</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Artisan Showcase Platform</p>
    </footer>

    <script>
        // Simple filter logic placeholder
        console.log("Website Loaded Successfully!");
    </script>
</body>
</html>
