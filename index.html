<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatDrop - Anonymous Global Chat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#1c1c1c;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #333;
}

#online{
font-size:14px;
color:#00ff99;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
margin-bottom:10px;
padding:8px;
background:#1e1e1e;
border-radius:8px;
font-size:14px;
}

.username{
color:#00ffcc;
font-weight:bold;
}

#inputArea{
display:flex;
padding:10px;
background:#1c1c1c;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
outline:none;
background:#2c2c2c;
color:white;
}

button{
padding:10px;
margin-left:5px;
border:none;
background:#00cc66;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#00aa55;
}
</style>
</head>

<body>

<header>
ChatDrop 🌍
<div id="online">Online: 0</div>
</header>

<div id="chat"></div>

<div id="inputArea">
<input type="text" id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
var firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().signInAnonymously();

var database = firebase.database();
var chatRef = database.ref("messages");
var onlineRef = database.ref("online");

var username = "User" + Math.floor(Math.random() * 9999);

firebase.auth().onAuthStateChanged(function(user) {
if (user) {
var userStatusRef = onlineRef.child(user.uid);
userStatusRef.set(true);
userStatusRef.onDisconnect().remove();
}
});

// Online Count
onlineRef.on("value", function(snapshot){
document.getElementById("online").innerText = "Online: " + snapshot.numChildren();
});

// Bad Words Filter
var badWords = ["sex","porn","xxx","nude"];

function cleanMessage(msg){
badWords.forEach(word=>{
var regex = new RegExp(word,"gi");
msg = msg.replace(regex,"****");
});
return msg;
}

// Spam Control
var lastMessageTime = 0;

function sendMessage(){
var input = document.getElementById("messageInput");
var message = input.value.trim();

if(message === "") return;

var now = Date.now();
if(now - lastMessageTime < 2000){
alert("Wait 2 seconds before sending again.");
return;
}

lastMessageTime = now;
message = cleanMessage(message);

chatRef.push({
username: username,
text: message,
timestamp: now
});

input.value = "";
}

// Display Messages
chatRef.limitToLast(100).on("child_added", function(snapshot){
var msg = snapshot.val();
var chat = document.getElementById("chat");

var div = document.createElement("div");
div.classList.add("message");

div.innerHTML = "<span class='username'>" + msg.username + ":</span> " + msg.text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
});

</script>

</body>
</html>
