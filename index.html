<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d35400">
    <link rel="canonical" href="https://yourwebsite.com/"> <title>Artisan Hub Punjab | ਅਸਲੀ ਪੰਜਾਬੀ ਕਲਾ</title>
    <meta name="description" content="Artisan Hub Punjab: ਅਸਲੀ ਤੇ ਸ਼ੁੱਧ ਪੰਜਾਬੀ ਕਲਾ ਅਤੇ ਹੱਥੀਂ ਬਣੇ ਉਤਪਾਦ।">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063183.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Punjabi:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --light: #f4f4f4; }
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Punjabi', sans-serif; background-color: var(--light); color: #333; line-height: 1.6; }

        nav { background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; }
        .nav-links a { text-decoration: none; color: var(--dark); margin-left: 20px; font-weight: 600; padding: 10px; }
        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; }

        header { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1200') center/cover; height: 40vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .img-box { aspect-ratio: 16/9; width: 100%; object-fit: cover; border-radius: 8px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .order-form { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 40px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { background: var(--primary); color: white; padding: 12px; width: 100%; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .submit-btn:disabled { background: #95a5a6; }

        #responseMsg { display: none; padding: 15px; text-align: center; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        footer { background: var(--dark); color: white; padding: 30px; text-align: center; }

        @media (max-width: 600px) { .menu-toggle { display: block; } .nav-links { display: none; flex-direction: column; position: absolute; top: 60px; right: 0; background: white; width: 100%; padding: 20px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo" style="color:var(--primary); font-weight:700;">Artisan Hub</div>
    <div class="menu-toggle" onclick="document.querySelector('.nav-links').style.display = (document.querySelector('.nav-links').style.display === 'flex' ? 'none' : 'flex')">☰</div>
    <div class="nav-links" onclick="if(window.innerWidth < 600) this.style.display='none'">
        <a href="#products">ਉਤਪਾਦ</a>
        <a href="#contact">ਆਰਡਰ</a>
    </div>
</nav>

<header><h1>ਪੰਜਾਬੀ ਵਿਰਸਾ ਤੇ ਕਾਰੀਗਰੀ</h1></header>

<div class="container" id="products">
    <div class="product-grid">
        <div class="card">
            <img class="img-box" src="https://images.unsplash.com/photo-1599521418632-f9a77074154c?w=500" width="500" height="281" alt="ਸ਼ਾਹੀ ਫੁਲਕਾਰੀ" loading="lazy">
            <h3>ਸ਼ਾਹੀ ਫੁਲਕਾਰੀ</h3>
            <p>ਕੀਮਤ: ₹1,500</p>
            <a href="https://wa.me/917087806377?text=ਮੈਨੂੰ%20ਸ਼ਾਹੀ%20ਫੁਲਕਾਰੀ%20ਬਾਰੇ%20ਜਾਣਕਾਰੀ%20ਚਾਹੀਦੀ%20ਹੈ" class="submit-btn" style="display:block; text-align:center; margin-top:10px; text-decoration:none;">WhatsApp 'ਤੇ ਆਰਡਰ</a>
        </div>
    </div>
</div>

[attachment_0](attachment)

<section id="contact" class="order-form">
    <h2>ਆਰਡਰ ਫਾਰਮ</h2>
    <form id="orderForm" action="https://formspree.io/f/xeergzvv" method="POST">
        <input type="text" name="_honey" style="display:none">
        <label for="name">ਨਾਮ:</label>
        <input type="text" id="name" name="name" placeholder="ਆਪਣਾ ਪੂਰਾ ਨਾਮ ਲਿਖੋ" required>
        <label for="phone">ਫੋਨ:</label>
        <input type="tel" id="phone" name="phone" placeholder="10 ਅੰਕਾਂ ਦਾ ਨੰਬਰ" pattern="[0-9]{10}" required>
        <label for="category">ਉਤਪਾਦ:</label>
        <select id="category" name="category" required>
            <option value="ਕਢਾਈ">ਕਢਾਈ</option>
            <option value="ਮਿੱਟੀ ਦੇ ਭਾਂਡੇ">ਮਿੱਟੀ ਦੇ ਭਾਂਡੇ</option>
        </select>
        <label for="address">ਪਤਾ:</label>
        <textarea id="address" name="address" rows="3" placeholder="ਆਪਣਾ ਡਿਲੀਵਰੀ ਪਤਾ ਲਿਖੋ" required></textarea>
        <button type="submit" class="submit-btn">ਆਰਡਰ ਭੇਜੋ</button>
    </form>
    <p id="responseMsg"></p>
</section>

<footer>
    <p>ਕਾਲ ਕਰੋ: <a href="tel:+917087806377" style="color:white; text-decoration:none;">+91 70878 06377</a></p>
    <p>&copy; 2026 Artisan Hub Punjab.</p>
</footer>

<script>
    const form = document.getElementById('orderForm');
    const btn = form.querySelector('.submit-btn');
    const msg = document.getElementById('responseMsg');
    
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        btn.disabled = true; btn.innerText = "ਭੇਜਿਆ ਜਾ ਰਿਹਾ ਹੈ...";
        fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } })
        .then(response => {
            if (response.ok) {
                msg.style.display = "block"; msg.style.background = "#e8f5e9"; msg.style.color = "#2e7d32";
                msg.innerText = "ਧੰਨਵਾਦ! ਆਰਡਰ ਸਫਲ ਰਿਹਾ।"; form.reset();
            } else { throw new Error(); }
        })
        .catch(() => {
            msg.style.display = "block"; msg.style.background = "#ffebee"; msg.style.color = "#c62828";
            msg.innerText = "ਕੋਈ ਗਲਤੀ ਹੋਈ, ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।";
        })
        .finally(() => { 
            btn.disabled = false; btn.innerText = "ਆਰਡਰ ਭੇਜੋ";
            setTimeout(() => { msg.style.display = "none"; }, 5000);
        });
    });
</script>
</body>
</html>
