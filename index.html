<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Hub Punjab | Authentic Handcrafted Art</title>
    
    <meta name="description" content="Shop authentic, handcrafted Punjabi products. Quality assured.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --light: #f4f4f4; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--light); color: #333; }
        
        .hero { padding: 60px 20px; background: var(--dark); color: white; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        
        /* Forms */
        .order-section { background: white; padding: 30px; border-radius: 12px; margin-top: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        .btn { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<section class="hero">
    <h1>ਪੰਜਾਬੀ ਵਿਰਸਾ</h1>
    <p>Authentic Art from the heart of Punjab</p>
</section>

<div class="container">
    <h2>Our Products</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1599521418632-f9a77074154c?w=500" alt="Phulkari">
            <h3>Shahi Phulkari</h3>
            <p><strong>Price:</strong> ₹1,500</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1578328819036-311894d03923?w=500" alt="Pottery">
            <h3>Handmade Pottery</h3>
            <p><strong>Price:</strong> ₹800</p>
        </div>
    </div>
    

    <section class="order-section" id="contact">
        <h2>Place Your Order</h2>
        <form id="orderForm" action="https://formspree.io/f/xeergzvv" method="POST">
            <label>Select Product:</label>
            <select name="product" id="productSelect" onchange="updatePrice()" required>
                <option value="Shahi Phulkari" data-price="₹1,500">Shahi Phulkari - ₹1,500</option>
                <option value="Handmade Pottery" data-price="₹800">Handmade Pottery - ₹800</option>
            </select>
            
            <p><strong>Total Amount:</strong> <span id="totalPrice">₹1,500</span></p>

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <textarea name="address" placeholder="Delivery Address" required></textarea>
            
            <button type="submit" id="submitBtn" class="btn">Confirm Order (COD)</button>
        </form>
    </section>
</div>

<a href="https://wa.me/917087806377" class="whatsapp-float">WhatsApp Support</a>

<script>
    function updatePrice() {
        const select = document.getElementById('productSelect');
        document.getElementById('totalPrice').innerText = select.options[select.selectedIndex].getAttribute('data-price');
    }
    
    document.getElementById('orderForm').addEventListener('submit', () => {
        document.getElementById('submitBtn').innerText = "Processing...";
    });
</script>
</body>
</html>
