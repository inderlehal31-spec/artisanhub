<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Soul - Burn Your Secret</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #d4a373;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Paper Styling */
        #paper-container {
            position: relative;
            background: #f4e1d2;
            padding: 30px;
            min-height: 250px;
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.2);
            border-radius: 2px;
            transition: all 0.5s ease;
        }

        #confession-text {
            width: 100%;
            height: 200px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 18px;
            color: #432818;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Burn Effect Animation */
        .burning {
            animation: burnAway 2s forwards ease-in;
            pointer-events: none;
            position: relative;
        }

        @keyframes burnAway {
            0% {
                transform: scale(1);
                filter: brightness(1) sepia(0);
                opacity: 1;
            }
            30% {
                filter: brightness(1.2) sepia(0.5) saturate(2);
                box-shadow: 0 0 50px #ff4500;
            }
            100% {
                transform: scale(1.1) translateY(-50px);
                filter: brightness(0) grayscale(1);
                opacity: 0;
                clip-path: polygon(10% 0%, 90% 10%, 100% 40%, 80% 90%, 20% 100%, 0% 50%);
            }
        }

        /* Fire Sparks Effect */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff4500;
            border-radius: 50%;
            pointer-events: none;
        }

        .buttons {
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .burn-btn {
            background-color: #e63946;
            color: white;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }

        .burn-btn:hover {
            background-color: #ff0000;
            transform: scale(1.05);
        }

        .post-btn {
            background-color: #2a9d8f;
            color: white;
        }

        #status-msg {
            margin-top: 20px;
            color: #d4a373;
            font-style: italic;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OPEN SOUL</h1>
        <p>Apna raaz likho te dil halka karo...</p>

        <div id="paper-container">
            <textarea id="confession-text" placeholder="Aithe likho..."></textarea>
        </div>

        <div class="buttons">
            <button class="burn-btn" onclick="burnConfession()">BURN IT (Kise nu na dikhao)</button>
            <button class="post-btn" onclick="postConfession()">POST (Duniya nu dso)</button>
        </div>

        <div id="status-msg"></div>
    </div>

    <script>
        function burnConfession() {
            const paper = document.getElementById('paper-container');
            const text = document.getElementById('confession-text');
            const msg = document.getElementById('status-msg');

            if (text.value.trim() === "") {
                alert("Pehlan kuj likho taan sahi!");
                return;
            }

            // Add burning class for animation
            paper.classList.add('burning');
            msg.innerText = "Tuhada raaz swaah ho reha hai...";

            // Create Sparkles
            for (let i = 0; i < 30; i++) {
                createSpark();
            }

            // Reset after animation
            setTimeout(() => {
                text.value = "";
                paper.classList.remove('burning');
                msg.innerText = "Tuhada raaz hamesha layi mitya gaya.";
                alert("Raaz swaah ho gaya! Kise ne nahi parhya.");
            }, 2500);
        }

        function postConfession() {
            const text = document.getElementById('confession-text').value;
            if (text.trim() === "") {
                alert("Kuj likho!");
                return;
            }
            alert("Tuhada raaz 'Open Soul' map te post ho gaya!");
            // Aithe tusi Database naal connect kar sakde ho
        }

        function createSpark() {
            const spark = document.createElement('div');
            spark.classList.add('spark');
            document.body.appendChild(spark);

            const x = window.innerWidth / 2 + (Math.random() - 0.5) * 300;
            const y = window.innerHeight / 2 + (Math.random() - 0.5) * 200;

            spark.style.left = x + 'px';
            spark.style.top = y + 'px';

            const destinationX = x + (Math.random() - 0.5) * 200;
            const destinationY = y - Math.random() * 400;

            spark.animate([
                { opacity: 1, transform: 'translate(0, 0)' },
                { opacity: 0, transform: `translate(${destinationX - x}px, ${destinationY - y}px)` }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'ease-out'
            }).onfinish = () => spark.remove();
        }
    </script>
</body>
</html>
