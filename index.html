<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DareDrop Party</title>

<style>
body{
font-family:sans-serif;
margin:0;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
text-align:center;
}

.container{padding:20px}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
background:#ffffff;
color:#ff416c;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:hover{transform:scale(1.05)}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
}

.card{
background:white;
color:#333;
padding:20px;
border-radius:15px;
margin-top:20px;
font-size:18px;
}

.hidden{display:none}

#wheel{
width:300px;
height:300px;
border-radius:50%;
border:8px solid white;
margin:20px auto;
position:relative;
overflow:hidden;
}

.slice{
position:absolute;
width:50%;
height:50%;
transform-origin:100% 100%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.arrow{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:30px solid white;
margin:auto;
}
</style>
</head>

<body>

<div class="container">

<h1>DareDrop Party</h1>

<div id="home">
<button onclick="startMode('self')">Self Mode</button>
<button onclick="startMode('friends')">With Friends</button>
</div>

<div id="friendSection" class="hidden">
<input id="friendInput" placeholder="Friend name">
<button onclick="addFriend()">Add Friend</button>
<div id="friendList"></div>
<div class="arrow"></div>
<div id="wheel"></div>
<button onclick="spinWheel()">Spin Wheel</button>
</div>

<div id="categorySection" class="hidden">
<h3>Select Category</h3>
<button onclick="setCategory('fun')">Fun</button>
<button onclick="setCategory('love')">Love</button>
<button onclick="setCategory('couple')">Couple</button>
<button onclick="setCategory('danger')">Dangerous</button>
<button onclick="setCategory('extreme')">Extreme</button>
</div>

<div id="choiceSection" class="hidden">
<h3>Truth or Dare</h3>
<button onclick="getTask('truth')">Truth</button>
<button onclick="getTask('dare')">Dare</button>
</div>

<div id="result" class="card hidden"></div>

<button id="resetBtn" class="hidden" onclick="location.reload()">Play Again</button>

</div>

<script>

let mode=""
let friends=[]
let selectedFriend=""
let category=""

const data={
fun:{
truth:["What makes you laugh most?","Your embarrassing moment?","Favorite cartoon?","Funniest friend?","Secret talent?"],
dare:["Dance 10 sec","Sing loudly","Act like baby","Jump 10 times","Make funny face"]
},
love:{
truth:["First crush?","Do you believe love?","Love marriage or arrange?","Romantic memory?","Love fear?"],
dare:["Send heart emoji","Say I love you loudly","Call crush","Write love line","Hug pillow"]
},
couple:{
truth:["Best couple you know?","Jealous type?","Biggest fight?","Proposal idea?","Love language?"],
dare:["Romantic walk act","Hold hands air","Send kiss emoji","Say pickup line","Love pose"]
},
danger:{
truth:["Biggest risk?","Fear secret?","Ever lied badly?","Fight memory?","Scary moment?"],
dare:["Eat spicy","Shout loudly","Do pushups","Cold water splash","Scary face"]
},
extreme:{
truth:["Wild dream?","Craziest idea?","Rule break?","Secret fantasy?","Extreme wish?"],
dare:["Run outside","Do plank","Dance crazy","Spin 10 times","Talk nonsense"]
}
}

function startMode(m){
mode=m
document.getElementById("home").classList.add("hidden")
if(m==="self"){
document.getElementById("categorySection").classList.remove("hidden")
}else{
document.getElementById("friendSection").classList.remove("hidden")
}
}

function addFriend(){
let name=document.getElementById("friendInput").value
if(!name)return
friends.push(name)
document.getElementById("friendInput").value=""
renderFriends()
renderWheel()
}

function renderFriends(){
document.getElementById("friendList").innerHTML=friends.join(", ")
}

function renderWheel(){
let wheel=document.getElementById("wheel")
wheel.innerHTML=""
let angle=360/friends.length
friends.forEach((f,i)=>{
let div=document.createElement("div")
div.className="slice"
div.style.transform=`rotate(${i*angle}deg) skewY(${90-angle}deg)`
div.innerHTML=f
wheel.appendChild(div)
})
}

function spinWheel(){
if(friends.length===0)return
let index=Math.floor(Math.random()*friends.length)
selectedFriend=friends[index]
alert("Selected: "+selectedFriend)
document.getElementById("categorySection").classList.remove("hidden")
}

function setCategory(c){
category=c
document.getElementById("categorySection").classList.add("hidden")
document.getElementById("choiceSection").classList.remove("hidden")
}

function getTask(type){
let arr=data[category][type]
let task=arr[Math.floor(Math.random()*arr.length)]
let text=(selectedFriend?selectedFriend+": ":"")+task
let result=document.getElementById("result")
result.innerHTML=text+"<br><br><button onclick='shareTask(`"+text+"`)'>Share</button>"
result.classList.remove("hidden")
document.getElementById("choiceSection").classList.add("hidden")
document.getElementById("resetBtn").classList.remove("hidden")
}

function shareTask(t){
window.open("https://wa.me/?text="+encodeURIComponent(t))
}

</script>

</body>
</html>
