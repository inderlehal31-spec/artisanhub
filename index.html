<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DareDrop Super Party Pro</title>
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #4facfe;
            --success: #00b09b;
            --warning: #ffd700;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #4facfe, #00f2fe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border: 1px solid var(--glass); border-radius: 30px;
            padding: 20px; width: 90%; max-width: 450px; margin-top: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
        }

        .game-btn {
            background: white; color: var(--primary); border: none;
            padding: 12px 20px; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s; margin: 8px; font-size: 14px;
        }

        .game-btn:hover { transform: scale(1.05); }
        .game-btn:active { transform: scale(0.9); }

        /* Parchiyan Styling */
        .chit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .chit {
            background: #fff; color: #333; height: 100px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.5s;
            font-size: 16px; border: 2px solid transparent;
        }

        .hidden { display: none; }
        .highlight { color: var(--warning); font-size: 28px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* Chat/Log Box */
        .chat-box {
            background: rgba(0, 0, 0, 0.3); border-radius: 15px;
            height: 100px; overflow-y: auto; padding: 12px;
            text-align: left; font-size: 13px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .friend-tag {
            display: inline-block; background: var(--glass); padding: 5px 15px;
            border-radius: 20px; margin: 4px; font-size: 13px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .friend-tag:hover { background: rgba(255,0,0,0.4); }

        #timerDisplay { font-size: 30px; font-weight: bold; color: white; margin: 10px; transition: 0.3s; }
        .timer-low { color: #ff416c !important; transform: scale(1.2); }

    </style>
</head>
<body>

    <h1 style="margin-top: 25px; letter-spacing: 2px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">🔥 DareDrop Pro</h1>

    <div style="display: flex; gap: 5px;">
        <button class="game-btn" onclick="toggleMenu()">🎮 Choose Game</button>
        <button class="game-btn" onclick="addFriend()" style="background:var(--success); color:white;">👤 + Add Friend</button>
    </div>

    <div class="main-card">
        <div id="friendListContainer"></div>
        <h2 id="gameTitle">Ready?</h2>
        <p id="gameDesc" style="opacity: 0.9; font-size: 14px;">ਨਾਮ ਐਡ ਕਰੋ ਤੇ ਖੇਡਣਾ ਸ਼ੁਰੂ ਕਰੋ!</p>

        <div id="sectionTruth" class="hidden">
            <div id="selectedPlayer" class="highlight">🎲 Spin First!</div>
            <button onclick="spinPlayer()" class="game-btn" style="background:var(--secondary); color:white;">🎡 Spin Friend</button>
            <div style="margin: 15px 0;">
                <button onclick="getTask('truth')" class="game-btn" style="background:var(--success); color:white; width:100px;">Truth</button>
                <button onclick="getTask('dare')" class="game-btn" style="background:var(--primary); color:white; width:100px;">Dare</button>
            </div>
            <div id="taskDisplay" style="padding: 10px; font-size: 20px; min-height: 50px; font-weight: 500;"></div>
        </div>

        <div id="sectionParchiyan" class="hidden">
            <div id="parchiPlayer" class="highlight">...</div>
            <p id="parchiInstruction">ਪਰਚੀ ਦੇਖਣ ਲਈ ਕਲਿੱਕ ਕਰੋ!</p>
            <div class="chit-grid">
                <div class="chit" id="c1" onclick="handleParchi(1)">📄<br>Chit 1</div>
                <div class="chit" id="c2" onclick="handleParchi(2)">📄<br>Chit 2</div>
                <div class="chit" id="c3" onclick="handleParchi(3)">📄<br>Chit 3</div>
                <div class="chit" id="c4" onclick="handleParchi(4)">📄<br>Chit 4</div>
            </div>
            <button class="game-btn" onclick="resetParchiyan()" style="margin-top:15px; background: transparent; color: white; border: 1px solid white;">🔄 Shuffle Chits</button>
        </div>

        <div id="sectionAntakshari" class="hidden">
            <div id="letterBox" class="highlight" style="font-size: 70px;">?</div>
            <div id="timerDisplay">15s</div>
            <button onclick="generateLetter()" class="game-btn" style="background:var(--secondary); color:white;">🎤 New Letter</button>
        </div>

        <div class="chat-box" id="chat">
            <div><b>System:</b> Welcome! 🥳</div>
        </div>
    </div>

    <div id="menuOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;" onclick="toggleMenu()">
        <div style="background:white; padding:25px; border-radius:25px; width:80%; max-width:300px;" onclick="event.stopPropagation()">
            <div style="padding:15px; color:#333; font-weight:bold; cursor:pointer; text-align:center; border-bottom:1px solid #eee;" onclick="loadGame('Truth & Dare')">🔥 Truth or Dare</div>
            <div style="padding:15px; color:#333; font-weight:bold; cursor:pointer; text-align:center; border-bottom:1px solid #eee;" onclick="loadGame('Antakshari')">🎤 Antakshari</div>
            <div style="padding:15px; color:#333; font-weight:bold; cursor:pointer; text-align:center;" onclick="loadGame('Parchiyan')">🃏 Parchiyan (ਰਾਜਾ ਰਾਣੀ)</div>
        </div>
    </div>

    <script>
        let friends = [];
        let currentFriendIndex = 0;
        let timerInterval;
        let parchiyanNames = ["ਰਾਜਾ 👑", "ਵਜ਼ੀਰ 🗡️", "ਚੋਰ 🎭", "ਸਿਪਾਹੀ 👮"];
        let shuffledChits = [];

        function toggleMenu() {
            const menu = document.getElementById('menuOverlay');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function addFriend() {
            let name = prompt("ਦੋਸਤ ਦਾ ਨਾਮ ਲਿਖੋ:");
            if (name && name.trim() !== "") {
                if(friends.includes(name.trim())) return alert("ਨਾਮ ਪਹਿਲਾਂ ਹੀ ਹੈ!");
                friends.push(name.trim());
                updateFriendList();
                addChat("✅ " + name + " ਐਡ ਹੋ ਗਿਆ!");
            }
        }

        function deleteFriend(index) {
            addChat("❌ " + friends[index] + " ਨੂੰ ਹਟਾ ਦਿੱਤਾ।");
            friends.splice(index, 1);
            updateFriendList();
        }

        function updateFriendList() {
            const container = document.getElementById('friendListContainer');
            container.innerHTML = friends.map((f, i) => `<span class="friend-tag" onclick="deleteFriend(${i})">${f} ✕</span>`).join("");
        }

        function loadGame(game) {
            if (friends.length < 2 && game !== 'Antakshari') return alert("ਘੱਟੋ-ਘੱਟ 2 ਦੋਸਤ ਐਡ ਕਰੋ!");
            
            document.querySelectorAll('.main-card > div').forEach(div => { if(div.id) div.classList.add('hidden'); });
            document.getElementById('gameTitle').innerText = game;
            
            if(game === 'Truth & Dare') document.getElementById('sectionTruth').classList.remove('hidden');
            else if(game === 'Parchiyan') { document.getElementById('sectionParchiyan').classList.remove('hidden'); resetParchiyan(); }
            else if(game === 'Antakshari') document.getElementById('sectionAntakshari').classList.remove('hidden');
            
            toggleMenu();
            celebrate();
        }

        // --- Celebration Effect ---
        function celebrate() {
            for(let i=0; i<30; i++) {
                let conf = document.createElement('div');
                conf.innerText = "🎉";
                conf.style.position = "fixed";
                conf.style.left = Math.random() * 100 + "vw";
                conf.style.top = "100vh";
                conf.style.fontSize = "20px";
                conf.style.zIndex = "1000";
                conf.style.transition = "transform 2s ease-out, opacity 2s";
                document.body.appendChild(conf);
                setTimeout(() => {
                    conf.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                    conf.style.opacity = "0";
                }, 100);
                setTimeout(() => conf.remove(), 2000);
            }
        }

        // --- Truth/Dare ---
        function spinPlayer() {
            let p = friends[Math.floor(Math.random() * friends.length)];
            document.getElementById('selectedPlayer').innerText = "👉 " + p;
        }

        function getTask(type) {
            const list = type === 'truth' ? ["ਸਭ ਤੋਂ ਵੱਡੀ ਗਲਤੀ?", "ਆਖਰੀ ਝੂਠ?", "ਕਿਸ ਤੋਂ ਡਰ ਲੱਗਦਾ?", "ਪਹਿਲਾ ਕ੍ਰਸ਼?"] : ["ਕੋਈ ਪੰਜਾਬੀ ਗਾਣਾ ਗਾਓ", "10 ਪੁਸ਼-ਅੱਪ", "ਮੁਰਗਾ ਬਣੋ", "ਫਨੀ ਫੋਟੋ ਖਿਚੋ"];
            document.getElementById('taskDisplay').innerText = list[Math.floor(Math.random() * list.length)];
        }

        // --- Parchiyan ---
        function resetParchiyan() {
            shuffledChits = [...parchiyanNames].sort(() => Math.random() - 0.5);
            currentFriendIndex = 0;
            document.getElementById('parchiPlayer').innerText = friends[0];
            for(let i=1; i<=4; i++) {
                let c = document.getElementById('c'+i);
                c.innerText = "📄\nChit " + i;
                c.style.background = "white";
                c.style.borderColor = "transparent";
            }
        }

        function handleParchi(id) {
            let el = document.getElementById('c'+id);
            if (el.innerText.includes("Chit")) {
                let val = shuffledChits[id-1];
                el.innerText = val;
                el.style.background = "var(--warning)";
                if(val.includes("ਰਾਜਾ")) celebrate();
            } else {
                el.innerText = "📄\nChit " + id;
                el.style.background = "white";
                currentFriendIndex = (currentFriendIndex + 1) % friends.length;
                document.getElementById('parchiPlayer').innerText = friends[currentFriendIndex];
                addChat("Passed to " + friends[currentFriendIndex]);
            }
        }

        // --- Antakshari ---
        function generateLetter() {
            const pLetters = "ੳਅੲਸਹਕਖਗਘਚਛਜਝਟਠਡਢਤਥਦਧਨਪਫਬਭਮਯਰਲਵੜ";
            document.getElementById('letterBox').innerText = pLetters[Math.floor(Math.random() * pLetters.length)];
            let timeLeft = 15;
            let timerEl = document.getElementById('timerDisplay');
            timerEl.classList.remove('timer-low');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";
                if(timeLeft <= 5) timerEl.classList.add('timer-low');
                if(timeLeft <= 0) { clearInterval(timerInterval); alert("ਸਮਾਂ ਖਤਮ! 🛑"); }
            }, 1000);
        }

        function addChat(msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Log:</b> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
