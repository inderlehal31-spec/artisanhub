<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DareDrop Elite Party</title>
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00dbde;
            --bg: #0f0c29;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 2.5rem; text-shadow: 0 0 10px var(--primary); margin-bottom: 20px; }

        input {
            padding: 12px;
            width: 60%;
            border-radius: 25px;
            border: none;
            outline: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(to right, var(--primary), #ff5722);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,0,85,0.4); }

        /* Wheel Styling */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--primary);
            z-index: 10;
        }

        .slice {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .hidden { display: none; }

        #selectedDisplay {
            font-size: 1.5rem;
            margin: 15px 0;
            color: var(--secondary);
            font-weight: bold;
            min-height: 30px;
        }

        .card {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>DareDrop 🎲</h1>

    <div id="setup">
        <input type="text" id="pName" placeholder="Player Name...">
        <button onclick="addPlayer()">Add</button>
        <div id="pList" style="margin: 10px 0; font-size: 0.9rem;"></div>
        <button onclick="showWheel()" id="startBtn" class="hidden">Start Game</button>
    </div>

    <div id="gameSection" class="hidden">
        <div class="wheel-container">
            <div class="arrow"></div>
            <div id="wheel"></div>
        </div>
        <div id="selectedDisplay"></div>
        <button onclick="spinNow()">SPIN WHEEL</button>
    </div>

    <div id="catSection" class="hidden">
        <h3>Choose Vibes</h3>
        <button onclick="setCat('fun')">Fun</button>
        <button onclick="setCat('danger')">Danger</button>
        <button onclick="setCat('love')">Love</button>
    </div>

    <div id="choiceSection" class="hidden">
        <button onclick="getFinal('truth')">Truth</button>
        <button onclick="getFinal('dare')">Dare</button>
    </div>

    <div id="result" class="card hidden"></div>
    <button id="reset" class="hidden" onclick="location.reload()" style="margin-top:20px">Next Round</button>
</div>

<script>
    let players = [];
    let selectedPlayer = "";
    let category = "";
    const colors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF3", "#F3FF33"];

    const data = {
        fun: { truth: ["Sabh ton fudu memory?", "Kise te crush hai?"], dare: ["Funny dance karo", "Padosi nu awaaz maro"] },
        danger: { truth: ["Kade police ne fadiye?", "Sab ton bada jhoot?"], dare: ["Mirchi khao", "10 Pushups"] },
        love: { truth: ["Pehla pyar kado hoya?", "Ki tusi single ho?"], dare: ["Apne crush nu hi likho", "Romantic line bolo"] }
    };

    function addPlayer() {
        let name = document.getElementById('pName').value;
        if(name) {
            players.push(name);
            document.getElementById('pName').value = "";
            document.getElementById('pList').innerText = "Players: " + players.join(", ");
            if(players.length >= 2) document.getElementById('startBtn').classList.remove('hidden');
        }
    }

    function showWheel() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('gameSection').classList.remove('hidden');
        drawWheel();
    }

    function drawWheel() {
        const wheel = document.getElementById('wheel');
        wheel.innerHTML = "";
        const angle = 360 / players.length;
        players.forEach((p, i) => {
            const slice = document.createElement('div');
            slice.className = 'slice';
            slice.style.backgroundColor = colors[i % colors.length];
            slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
            slice.innerHTML = `<span style="transform: skewY(-${90 - angle}deg) rotate(${angle/2}deg); position:absolute; right:10px; bottom:20px;">${p}</span>`;
            wheel.appendChild(slice);
        });
    }

    function spinNow() {
        const wheel = document.getElementById('wheel');
        const randDeg = Math.floor(3000 + Math.random() * 3000);
        wheel.style.transform = `rotate(${randDeg}deg)`;
        
        setTimeout(() => {
            const actualDeg = randDeg % 360;
            const sliceSize = 360 / players.length;
            // Calculate which player landed at the top (arrow)
            const index = Math.floor((360 - actualDeg) / sliceSize) % players.length;
            selectedPlayer = players[index];
            
            document.getElementById('selectedDisplay').innerText = "Target: " + selectedPlayer;
            setTimeout(() => {
                document.getElementById('catSection').classList.remove('hidden');
            }, 500);
        }, 4000);
    }

    function setCat(c) {
        category = c;
        document.getElementById('catSection').classList.add('hidden');
        document.getElementById('choiceSection').classList.remove('hidden');
    }

    function getFinal(type) {
        const tasks = data[category][type];
        const task = tasks[Math.floor(Math.random() * tasks.length)];
        const res = document.getElementById('result');
        res.innerHTML = `<strong>${selectedPlayer}</strong>, tuhada task hai:<br><br>${task}`;
        res.classList.remove('hidden');
        document.getElementById('choiceSection').classList.add('hidden');
        document.getElementById('reset').classList.remove('hidden');
    }
</script>

</body>
</html>
