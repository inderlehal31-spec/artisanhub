<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DareDrop Ultimate Party</title>
    <style>
        :root { --primary: #ff0055; --secondary: #00dbde; }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; background: #0f0c29; color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 95%; max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 25px; border-radius: 30px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .btn {
            width: 100%; padding: 15px; font-size: 1.1rem; margin: 10px 0;
            border-radius: 50px; border: none; cursor: pointer; font-weight: 800;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), #fb406c); color: white; }
        .btn-quit { background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b; margin-top: 20px; font-size: 0.8rem; width: 50%; }
        .hidden { display: none !important; }
        .task-display { background: white; color: #111; padding: 25px; border-radius: 20px; font-size: 1.3rem; font-weight: bold; }
        input { padding: 12px; width: 70%; border-radius: 20px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-logo">DAREDROP 🎲</h1>

    <div id="scene-entry" class="scene">
        <button class="btn btn-primary" onclick="navigateTo('setup')">Start Party</button>
    </div>

    <div id="scene-setup" class="scene hidden">
        <input type="text" id="pInput" placeholder="Friend's Name">
        <button onclick="addPlayer()" style="background:var(--secondary); border-radius:50%; width:40px; height:40px; border:none;">+</button>
        <div id="badge-container" style="margin:15px 0; color:var(--secondary)"></div>
        <button id="goBtn" class="btn btn-primary hidden" onclick="navigateTo('wheel')">Let's Spin!</button>
    </div>

    <div id="scene-wheel" class="scene hidden">
        <div class="wheel-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <button class="btn btn-primary" id="spinBtn" onclick="executeSpin()">SPIN</button>
    </div>

    <div id="scene-choice" class="scene hidden">
        <h2 id="lucky-player" style="color:var(--secondary)"></h2>
        <button class="btn" style="background:#3498db; color:white;" onclick="loadTask('truth')">TRUTH 💡</button>
        <button class="btn" style="background:#27ae60; color:white;" onclick="loadTask('dare')">DARE ⚡</button>
    </div>

    <div id="scene-result" class="scene hidden">
        <div class="task-display" id="final-task"></div>
        <button class="btn btn-primary" onclick="navigateTo('wheel')">Next Round 🔄</button>
    </div>

    <button id="quit-btn" class="btn btn-quit hidden" onclick="quitGame()">Quit Game 🚪</button>
</div>

<script>
    let players = [];
    let rotation = 0;
    let currentScene = 'entry';

    // Navigation Logic (Step-by-Step Back)
    function navigateTo(sceneId, isBack = false) {
        // Hide all scenes
        document.querySelectorAll('.scene').forEach(s => s.classList.add('hidden'));
        
        // Show target scene
        document.getElementById('scene-' + sceneId).classList.remove('hidden');
        currentScene = sceneId;

        // Quit button show/hide
        if(sceneId === 'entry') document.getElementById('quit-btn').classList.add('hidden');
        else document.getElementById('quit-btn').classList.remove('hidden');

        // History management
        if(!isBack) {
            history.pushState({ scene: sceneId }, "");
        }

        if(sceneId === 'wheel') drawWheel();
    }

    // Browser back button handle karna
    window.onpopstate = function(event) {
        if (event.state && event.state.scene) {
            navigateTo(event.state.scene, true);
        } else {
            navigateTo('entry', true);
        }
    };

    function quitGame() {
        if(confirm("Ki tusi game band karke starting te jana chahunde ho?")) {
            players = [];
            document.getElementById('badge-container').innerHTML = "";
            document.getElementById('goBtn').classList.add('hidden');
            navigateTo('entry');
        }
    }

    // Initial state set karna
    history.replaceState({ scene: 'entry' }, "");

    // --- Baki Game Logic ---
    function addPlayer() {
        const val = document.getElementById('pInput').value.trim();
        if(val) {
            players.push(val);
            document.getElementById('pInput').value = "";
            document.getElementById('badge-container').innerText = "Players: " + players.join(", ");
            if(players.length >= 2) document.getElementById('goBtn').classList.remove('hidden');
        }
    }

    function drawWheel() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const arc = (Math.PI * 2) / players.length;
        const colors = ["#ff0055", "#00dbde", "#ffbe0b", "#3a86ff"];

        ctx.clearRect(0,0,500,500);
        players.forEach((p, i) => {
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(i * arc + arc/2);
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.fillText(p.substring(0,8), 100, 10);
            ctx.restore();
        });
    }

    function executeSpin() {
        const extra = 3600 + Math.floor(Math.random() * 3600);
        rotation += extra;
        const canvas = document.getElementById('wheelCanvas');
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            const actualDeg = rotation % 360;
            const sliceSize = 360 / players.length;
            const index = Math.floor((360 - (actualDeg % 360)) / sliceSize) % players.length;
            const winner = players[index];
            document.getElementById('lucky-player').innerText = winner + "'s Turn";
            navigateTo('choice');
        }, 5000);
    }

    function loadTask(type) {
        const tasks = {
            truth: ["Pehla crush?", "Cheating kiti kade?", "Sabh ton vadda jhooth?"],
            dare: ["Dance karo", "Murgi bano", "Prank call karo"]
        };
        const task = tasks[type][Math.floor(Math.random() * tasks[type].length)];
        document.getElementById('final-task').innerText = task;
        navigateTo('result');
    }
</script>
</body>
</html>
