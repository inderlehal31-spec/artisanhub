
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DareDrop Party</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
margin:0;
color:white;
text-align:center;
}

.container{padding:20px;}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:12px;
background:#ff416c;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{opacity:0.9}

input,select{
padding:10px;
width:75%;
border-radius:10px;
border:1px solid #ccc;
}

#friendList span{
display:inline-block;
background:#eee;
padding:6px 12px;
margin:4px;
border-radius:12px;
font-size:13px;
}

.big{
font-size:22px;
font-weight:bold;
margin:18px 0;
min-height:40px;
}

.modeTag{
font-size:12px;
opacity:0.6;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 DareDrop Party</h1>

<div class="card">

<select id="mode">
<option value="self">Self Play</option>
<option value="friend">Friend Play</option>
</select>

<div class="modeTag">Choose mode & start fun 🎉</div>

<div id="friendBox" style="display:none">

<input id="friendInput" placeholder="Friend name">
<button onclick="addFriend()">Add</button>

<div id="friendList"></div>

<button onclick="spinFriend()">🎡 Spin Friend</button>

</div>

<div id="selectedFriend" class="big"></div>

<button onclick="getTruth()">Truth</button>
<button onclick="getDare()">Dare</button>

<div id="task" class="big"></div>

<button onclick="share()">📲 Share</button>

</div>
</div>

<script>

// ================= STATE =================
let friends=[]
let currentFriend="You"

// ================= BASE DATA =================
const truths=[
"Biggest crush ever?",
"Secret fear?",
"Last lie told?",
"Most embarrassing moment?",
"Dream job?",
"Biggest regret?",
"Hidden talent?",
"Secret habit?",
"Love or money?",
"First love memory?",
"Phone addiction level?",
"Celebrity crush?",
"Most awkward moment?",
"Favorite childhood memory?",
"Biggest insecurity?",
"Most emotional moment?",
"Person you trust most?",
"Biggest jealousy moment?",
"Last time you cried?",
"Secret wish?"
]

const dares=[
"Sing loudly 20 sec",
"Dance without music",
"Do 10 pushups",
"Take funny selfie",
"Act like baby",
"Do chicken dance",
"Speak robot voice",
"Say joke loudly",
"Run slow motion",
"Imitate teacher",
"Act scared",
"Do runway walk",
"Make weird face",
"Say poem dramatically",
"Do plank 15 sec",
"Speak in rhyme",
"Act like news reporter",
"Fake cry scene",
"Do superhero pose",
"Freestyle dance"
]

// ================= SMART GENERATOR =================
const truthTemplates=[
"Tell something embarrassing about",
"What do you fear about",
"What is your memory of",
"Have you ever hidden",
"What do you regret about",
"What is your fantasy about",
"Tell your opinion on"
]

const truthTopics=["love","school","friend","family","crush","future","phone","social media","money","childhood"]

const dareTemplates=[
"Imitate someone doing",
"Perform a dance about",
"Create a funny story about",
"Pretend scene of",
"Act dramatically about",
"Show reaction to",
"Do a performance about"
]

const dareTopics=["ghost","teacher","celebrity","robot","baby","villain","hero","friend","love","movie"]

// AUTO expand content
for(let i=0;i<80;i++){

let t1=truthTemplates[Math.floor(Math.random()*truthTemplates.length)]
let t2=truthTopics[Math.floor(Math.random()*truthTopics.length)]
truths.push(t1+" "+t2)

let d1=dareTemplates[Math.floor(Math.random()*dareTemplates.length)]
let d2=dareTopics[Math.floor(Math.random()*dareTopics.length)]
dares.push(d1+" "+d2)
}

// ================= MODE =================
mode.onchange=()=>{
friendBox.style.display=mode.value==="friend"?"block":"none"
}

// ================= FRIEND =================
function addFriend(){
let name=friendInput.value.trim()
if(name){
friends.push(name)
renderFriends()
friendInput.value=""
}
}

function renderFriends(){
friendList.innerHTML=friends.map(f=>`<span>${f}</span>`).join("")
}

function spinFriend(){
if(!friends.length)return alert("Add friends first")
let i=Math.floor(Math.random()*friends.length)
currentFriend=friends[i]
selectedFriend.innerText="👉 "+currentFriend
}

// ================= GAME =================
function getTruth(){showTask(random(truths))}
function getDare(){showTask(random(dares))}

function showTask(t){
if(mode.value==="self") currentFriend="You"
task.innerText=currentFriend+": "+t
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

// ================= SHARE =================
function share(){
if(!task.innerText) return
let text=encodeURIComponent(task.innerText+" 🔥 Play DareDrop "+location.href)
window.open("https://wa.me/?text="+text)
}

</script>

</body>
</html>
