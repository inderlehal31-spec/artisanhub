<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DareDrop Party</title>

<style>
body{
font-family:sans-serif;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
margin:0;
color:white;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
max-width:400px;
margin:auto;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
background:#ff416c;
color:white;
font-weight:bold;
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
}

#friendList span{
display:inline-block;
background:#eee;
padding:5px 10px;
margin:4px;
border-radius:10px;
}

.big{
font-size:22px;
font-weight:bold;
margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 DareDrop Party</h1>

<div class="card">

<select id="mode">
<option value="self">Self Play</option>
<option value="friend">Friend Play</option>
</select>

<br><br>

<div id="friendBox" style="display:none">

<input id="friendInput" placeholder="Friend name">
<button onclick="addFriend()">Add</button>

<div id="friendList"></div>

<button onclick="spinFriend()">🎡 Spin Friend</button>

</div>

<div id="selectedFriend" class="big"></div>

<button onclick="getTruth()">Truth</button>
<button onclick="getDare()">Dare</button>

<div id="task" class="big"></div>

<button onclick="share()">📲 Share</button>

</div>
</div>

<script>

let friends=[]
let currentFriend="You"

const truths=[
"Biggest crush ever?",
"Secret fear?",
"Last lie told?",
"Most embarrassing moment?",
"Dream job?",
"Biggest regret?",
"Last person you stalked?",
"Hidden talent?",
"Secret habit?",
"Love or money?"
]

const dares=[
"Sing loudly",
"Do 10 pushups",
"Dance 20 sec",
"Send emoji spam",
"Talk in accent",
"Compliment stranger",
"Call friend randomly",
"Act like cat",
"Do funny walk",
"Drink water fast"
]

// generate 100+
for(let i=0;i<90;i++){
truths.push("Truth question "+(i+11))
dares.push("Dare challenge "+(i+11))
}

mode.onchange=()=>{
friendBox.style.display=mode.value==="friend"?"block":"none"
}

function addFriend(){
let name=friendInput.value
if(name){
friends.push(name)
renderFriends()
friendInput.value=""
}
}

function renderFriends(){
friendList.innerHTML=friends.map(f=>`<span>${f}</span>`).join("")
}

function spinFriend(){
if(!friends.length)return alert("Add friends")
let i=Math.floor(Math.random()*friends.length)
currentFriend=friends[i]
selectedFriend.innerText="👉 "+currentFriend
}

function getTruth(){
showTask(random(truths))
}

function getDare(){
showTask(random(dares))
}

function showTask(t){
task.innerText=currentFriend+": "+t
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function share(){
let text=encodeURIComponent(task.innerText+" 🔥 Play DareDrop "+location.href)
window.open("https://wa.me/?text="+text)
}

</script>

</body>
</html>
