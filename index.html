<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Hub Punjab | ਆਰਡਰ ਫਾਰਮ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Punjabi:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --light: #f4f4f4; }
        body { font-family: 'Noto Sans Punjabi', sans-serif; background-color: var(--light); padding: 20px; }
        .order-form { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { background: var(--primary); color: white; padding: 12px; width: 100%; border: none; cursor: pointer; border-radius: 4px; font-size: 1rem; }
        .submit-btn:disabled { background: #7f8c8d; }
    </style>
</head>
<body>

<section class="order-form">
    <h2 style="text-align: center;">ਆਰਡਰ ਫਾਰਮ</h2>
    <form id="orderForm" action="https://formspree.io/f/xeergzvv" method="POST">
        
        <input type="text" name="name" placeholder="ਤੁਹਾਡਾ ਨਾਮ" required>
        <input type="email" name="email" placeholder="ਤੁਹਾਡੀ ਈਮੇਲ" required>
        <input type="tel" name="phone" placeholder="ਤੁਹਾਡਾ ਫੋਨ ਨੰਬਰ" required>

        <label>ਉਤਪਾਦ ਦੀ ਸ਼੍ਰੇਣੀ ਚੁਣੋ:</label>
        <select name="category" required>
            <option value="" disabled selected>ਕੈਟਾਗਰੀ ਚੁਣੋ...</option>
            <option value="ਕਢਾਈ ਅਤੇ ਕੱਪੜੇ">ਕਢਾਈ ਅਤੇ ਕੱਪੜੇ (ਫੁਲਕਾਰੀ ਆਦਿ)</option>
            <option value="ਮਿੱਟੀ ਦੇ ਭਾਂਡੇ">ਮਿੱਟੀ ਦੇ ਭਾਂਡੇ</option>
            <option value="ਪੰਜਾਬੀ ਜੁੱਤੀ">ਪੰਜਾਬੀ ਜੁੱਤੀ</option>
            <option value="ਸਜਾਵਟੀ ਸਮਾਨ">ਸਜਾਵਟੀ ਸਮਾਨ (Home Decor)</option>
            <option value="ਪਿੱਤਲ ਦੇ ਭਾਂਡੇ">ਪਿੱਤਲ ਦੇ ਭਾਂਡੇ</option>
            <option value="ਹੋਰ">ਹੋਰ</option>
        </select>

        <textarea name="address" rows="3" placeholder="ਆਪਣਾ ਪੂਰਾ ਪਤਾ (ਡਿਲੀਵਰੀ ਲਈ)..." required></textarea>
        <textarea name="message" rows="2" placeholder="ਕੋਈ ਹੋਰ ਜਾਣਕਾਰੀ (ਵਿਕਲਪਿਕ)"></textarea>
        
        <button type="submit" class="submit-btn">ਆਰਡਰ ਭੇਜੋ</button>
    </form>
    <p id="responseMsg" style="text-align: center; margin-top: 15px;"></p>
</section>

<script>
    const form = document.getElementById('orderForm');
    const msg = document.getElementById('responseMsg');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(form);
        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                msg.innerText = "ਧੰਨਵਾਦ! ਤੁਹਾਡਾ ਆਰਡਰ ਸਫਲਤਾਪੂਰਵਕ ਭੇਜ ਦਿੱਤਾ ਗਿਆ ਹੈ।";
                msg.style.color = "green";
                form.reset();
            } else {
                msg.innerText = "ਕੋਈ ਗਲਤੀ ਹੋਈ, ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।";
                msg.style.color = "red";
            }
        });
    });
</script>

</body>
</html>
