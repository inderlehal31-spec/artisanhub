<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🔥 DareDrop Party Pro</title>

    <style>
        /* 1. ANIMATED GRADIENT BACKGROUND */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { padding: 20px; }

        /* 2. MODERN GLASS CARD */
        .card {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 25px;
            max-width: 450px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        h1 { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }

        button {
            padding: 12px 20px;
            margin: 8px 4px;
            border: none;
            border-radius: 15px;
            background: #ff416c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(255, 65, 108, 0.3);
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:active { transform: scale(0.95); }

        input, select {
            padding: 12px;
            width: 80%;
            border-radius: 12px;
            border: 2px solid #eee;
            margin-bottom: 10px;
            outline: none;
        }

        /* 3. FRIEND TAGS & SPIN EFFECT */
        #friendList span {
            display: inline-block;
            background: #f0f0f0;
            color: #ff416c;
            padding: 6px 15px;
            margin: 5px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .big {
            font-size: 24px;
            font-weight: 800;
            margin: 20px 0;
            min-height: 50px;
            color: #ff416c;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 4. CHAT BOX STYLING */
        .chat-section {
            margin-top: 20px;
            border-top: 2px solid #f5f5f5;
            padding-top: 15px;
        }

        #chatLog {
            height: 150px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 15px;
            margin-bottom: 10px;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            border: 1px solid #eee;
        }

        .chat-msg {
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 4px solid #ff416c;
        }

        .task-log { border-left-color: #2196f3; background: #e3f2fd; }

        .modeTag { font-size: 12px; opacity: 0.7; margin-bottom: 15px; font-weight: bold; }

    </style>
</head>

<body>

<div class="container">
    <h1>🔥 DareDrop Party</h1>
    
    <div class="card">
        <select id="mode">
            <option value="friend">Friend Play (Dosto Naal)</option>
            <option value="self">Self Play (Kalle)</option>
        </select>

        <div class="modeTag">Party Mode ON! 🥳</div>

        <div id="friendBox">
            <input id="friendInput" placeholder="Dost da naam likho...">
            <button onclick="addFriend()">Add +</button>
            <div id="friendList"></div>
            <button onclick="spinFriend()" style="background:#4b6cb7;">🎡 Spin Friend</button>
        </div>

        <div id="selectedFriend" class="big">Taiyar Ho?</div>

        <div style="display:flex; justify-content:center;">
            <button onclick="getTruth()" style="background:#f093fb; color:black;">🤫 Truth</button>
            <button onclick="getDare()" style="background:#5eead4; color:black;">⚡ Dare</button>
        </div>

        <div id="task" class="big" style="color:#333; font-size:18px;">Click Truth or Dare!</div>

        <button onclick="share()" style="background:#25D366; width:90%;">📲 Share on WhatsApp</button>

        <div class="chat-section">
            <div id="chatLog">
                <p style="text-align:center; opacity:0.5;">Activity log shuru ho reha hai...</p>
            </div>
            <div style="display:flex; gap:5px;">
                <input id="chatInput" placeholder="Kujh mazedaar likho..." style="flex:1; margin:0; padding:8px;">
                <button onclick="addComment()" style="margin:0; padding:8px 15px;">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
// ================= STATE =================
let friends = [];
let currentFriend = "You";

// ================= CONTENT =================
const truths = ["Pehla crush koun si?", "Kade chori pakde gye?", "Sab ton vadda darr?", "Phone da password ki hai?", "Kise dost di burai kiti hai?", "Last time kadon roye si?"];
const dares = ["Bina music de dance karo", "10 Pushups lagao", "Kise nu prank call karo", "Funny face bana ke selfie bhejo", "Robot di awaaz ch bolo", "Punabi bolli pao"];

// Auto-generate more tasks
const truthTopics = ["paisa", "school", "ex", "rishtedaar", "secret"];
for(let i=0; i<30; i++) {
    truths.push("Tell us about your " + truthTopics[Math.floor(Math.random()*truthTopics.length)] + " story.");
    dares.push("Perform a funny act about " + truthTopics[Math.floor(Math.random()*truthTopics.length)] + ".");
}

// ================= CORE FUNCTIONS =================

mode.onchange = () => {
    friendBox.style.display = mode.value === "friend" ? "block" : "none";
    if(mode.value === "self") {
        selectedFriend.innerText = "It's Your Turn!";
        currentFriend = "You";
    }
};

function addFriend() {
    let name = friendInput.value.trim();
    if(name) {
        friends.push(name);
        renderFriends();
        friendInput.value = "";
    }
}

function renderFriends() {
    friendList.innerHTML = friends.map(f => `<span>${f}</span>`).join("");
}

function spinFriend() {
    if(!friends.length) return alert("Pehlan dostan de naam add karo!");
    
    let counter = 0;
    let spinInterval = setInterval(() => {
        selectedFriend.innerText = "🎲 " + friends[Math.floor(Math.random() * friends.length)];
        counter++;
        if(counter > 12) {
            clearInterval(spinInterval);
            currentFriend = friends[Math.floor(Math.random() * friends.length)];
            selectedFriend.innerText = "🔥 " + currentFriend;
            addLog(`Vari aayi: ${currentFriend}`, "task-log");
        }
    }, 80);
}

function getTruth() { showTask("🤫 Truth: " + random(truths)); }
function getDare() { showTask("⚡ Dare: " + random(dares)); }

function showTask(t) {
    if(mode.value === "self") currentFriend = "You";
    let fullMsg = currentFriend + " -> " + t;
    task.innerText = t;
    addLog(fullMsg, "task-log");
}

function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ================= CHAT & LOG =================

function addComment() {
    let msg = chatInput.value.trim();
    if(msg) {
        addLog(`💬: ${msg}`, "");
        chatInput.value = "";
    }
}

function addLog(text, className) {
    let time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    let div = document.createElement("div");
    div.className = "chat-msg " + className;
    div.innerHTML = `<b>[${time}]</b> ${text}`;
    chatLog.prepend(div);
}

function share() {
    if(!task.innerText || task.innerText.includes("Click")) return alert("Pehlan koi task select karo!");
    let text = encodeURIComponent("Oye dekh! DareDrop te mere layi eh task niklya: \n\n" + task.innerText + "\n\nTu vi khel: " + window.location.href);
    window.open("https://wa.me/?text=" + text);
}
</script>

</body>
</html>
