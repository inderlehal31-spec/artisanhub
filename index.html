<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rexa</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<h1>Rexa</h1>

<nav>

<a href="index.html">Home</a>

<a href="profile.html">Profile</a>

<a href="login.html">Login</a>

<a href="signup.html">Signup</a>

</nav>

</header>


<div class="container">

<div class="post-box">

<h2>Create Post</h2>

<textarea id="postInput" placeholder="What's on your mind?"></textarea>

<button onclick="createPost()">Post</button>

</div>


<div id="feed" class="feed">

<h2>News Feed</h2>

</div>

</div>


<script src="app.js"></script>


<!-- FIREBASE CODE START -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCxDUBknzr72aLZTv_8Ru-_RvRUWxbnudw",
authDomain: "rexa-platform.firebaseapp.com",
projectId: "rexa-platform",
storageBucket: "rexa-platform.firebasestorage.app",
messagingSenderId: "461455978632",
appId: "1:461455978632:web:d2cd38b72464732c40ef3d",
measurementId: "G-F3LQPDNKL4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// SIGNUP
window.signup=function(){

let email=document.getElementById("signupEmail").value
let password=document.getElementById("signupPassword").value

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("Account Created"))
.catch(e=>alert(e.message))

}


// LOGIN
window.login=function(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

signInWithEmailAndPassword(auth,email,password)
.then(()=>alert("Login Success"))
.catch(e=>alert(e.message))

}


// PROFILE
onAuthStateChanged(auth,(user)=>{

if(user){

let profile=document.getElementById("profileEmail")

if(profile){
profile.innerText=user.email
}

}

})

</script>

<!-- FIREBASE CODE END -->


</body>

</html>
