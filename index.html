<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duniya di Sab ton Slow Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 { color: #ffcc00; }

        .progress-container {
            width: 80%;
            background-color: #333;
            border-radius: 25px;
            padding: 5px;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .progress-bar {
            width: 0.0001%;
            height: 30px;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            border-radius: 20px;
            transition: width 0.5s;
        }

        #timer {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffcc;
        }

        .status {
            margin-top: 10px;
            font-style: italic;
            color: #aaa;
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <h1>Duniya Di Sab Ton Slow Loading...</h1>
    
    <div class="progress-container">
        <div id="myBar" class="progress-bar"></div>
    </div>

    <div id="timer">Calculating time left...</div>
    <div id="status" class="status">System garam ho reha hai...</div>

    <button onclick="speedUp()">Speed Up (Thoda Tezz Karo)</button>

    <script>
        // Target: 10 saal baad khatam hovega
        let timeLeft = 10 * 365 * 24 * 60 * 60; // seconds vich
        let progress = 0.00001;

        const messages = [
            "Chah pee lo, haley taan shuru hoya hai...",
            "Tuhade potey (grandkids) shayad 100% dekh sakan.",
            "Internet slow nahi hai, website hi dheet hai.",
            "Wait karo, mitti di khushbu feel karo...",
            "Loading meaning of life: 0.001% complete."
        ];

        function updateUI() {
            // Timer update
            const years = Math.floor(timeLeft / (365 * 24 * 3600));
            const days = Math.floor((timeLeft % (365 * 24 * 3600)) / (24 * 3600));
            const hours = Math.floor((timeLeft % (24 * 3600)) / 3600);
            const mins = Math.floor((timeLeft % 3600) / 60);
            const secs = timeLeft % 60;

            document.getElementById('timer').innerText = 
                `Time Left: ${years}y ${days}d ${hours}h ${mins}m ${secs}s`;
            
            // Progress bar update
            progress += 0.000001;
            document.getElementById('myBar').style.width = progress + "%";

            // Random status message
            if(secs % 15 === 0) {
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                document.getElementById('status').innerText = randomMsg;
            }

            timeLeft--;
        }

        function speedUp() {
            const jokes = [
                "Oye! Sabar kar, jaldi kide gal di hai?",
                "Button daban naal bijli tezz nahi hundi.",
                "Click kari jao, hona kujh nahi.",
                "Thak gaye? Main vi."
            ];
            alert(jokes[Math.floor(Math.random() * jokes.length)]);
        }

        setInterval(updateUI, 1000);
    </script>

</body>
</html>
