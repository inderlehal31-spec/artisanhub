<!DOCTYPE html>
<html>
<head>

<title>Global Voting Platform</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>Global Voting Platform</h1>
</header>

<div class="container">

<div class="card">

<h2>Create Poll</h2>

<input id="question" placeholder="Poll Question">

<input id="option1" placeholder="Option 1">
<input id="option2" placeholder="Option 2">

<button onclick="createPoll()">Create Poll</button>

</div>

<div class="card">

<h2>Live Polls</h2>

<div id="polls"></div>

</div>

</div>

<script>

// Firebase config (replace with your keys)

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function createPoll(){

let question=document.getElementById("question").value

let option1=document.getElementById("option1").value
let option2=document.getElementById("option2").value

db.collection("polls").add({

question:question,

options:[option1,option2],

votes:[0,0]

})

}

function loadPolls(){

db.collection("polls").onSnapshot((snapshot)=>{

let pollsHTML=""

snapshot.forEach(doc=>{

let poll=doc.data()

pollsHTML+=`

<div class="card">

<h3>${poll.question}</h3>

<button onclick="vote('${doc.id}',0)">
${poll.options[0]} (${poll.votes[0]})
</button>

<button onclick="vote('${doc.id}',1)">
${poll.options[1]} (${poll.votes[1]})
</button>

</div>

`

})

document.getElementById("polls").innerHTML=pollsHTML

})

}

function vote(id,index){

let ref=db.collection("polls").doc(id)

ref.get().then(doc=>{

let votes=doc.data().votes

votes[index]++

ref.update({votes:votes})

})

}

loadPolls()

</script>

</body>

</html>
