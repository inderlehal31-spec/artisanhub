<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DareDrop Elite Party</title>
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00dbde;
            --accent: #f39c12;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: radial-gradient(circle, #24243e, #302b63, #0f0c29);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 2.8rem; margin-bottom: 10px; text-shadow: 0 0 15px var(--primary); color: #fff; }

        .menu-btn {
            width: 80%;
            padding: 15px;
            font-size: 1.1rem;
            margin: 10px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--primary), #e91e63);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        input {
            padding: 12px 20px;
            width: 70%;
            border-radius: 25px;
            border: none;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        /* Spinning Wheel Styles */
        .wheel-box {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #fff;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(255,0,85,0.3);
        }

        .arrow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #fff;
            z-index: 20;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .slice {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .slice span {
            position: absolute;
            right: 15%; /* Moves text towards center */
            bottom: 35%;
            font-weight: 800;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            width: 80px;
            text-align: center;
        }

        .hidden { display: none; }

        .task-card {
            background: #fff;
            color: #222;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .share-btn {
            background: #25D366; /* WhatsApp Color */
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DareDrop 🎲</h1>

    <div id="modeSelection">
        <button class="menu-btn" onclick="startMode('self')">Solo (Self Task)</button>
        <button class="menu-btn" onclick="startMode('friends')">Party (With Friends)</button>
    </div>

    <div id="setup" class="hidden">
        <input type="text" id="pName" placeholder="Enter Player Name">
        <button class="menu-btn" style="width:auto; padding: 10px 25px;" onclick="addPlayer()">Add</button>
        <div id="pList" style="margin: 15px 0;"></div>
        <button class="menu-btn" id="startBtn" class="hidden" onclick="showWheel()">Ready to Spin!</button>
    </div>

    <div id="gameSection" class="hidden">
        <div class="wheel-box">
            <div class="arrow"></div>
            <div id="wheel"></div>
        </div>
        <h2 id="selectedDisplay">Ready?</h2>
        <button class="menu-btn" onclick="spinNow()">SPIN NOW</button>
    </div>

    <div id="catSection" class="hidden">
        <h3>Choose Vibes</h3>
        <button class="menu-btn" onclick="setCat('fun')">Fun 😄</button>
        <button class="menu-btn" onclick="setCat('danger')" style="background: #e67e22;">Danger 🔥</button>
        <button class="menu-btn" onclick="setCat('extreme')" style="background: #c0392b;">Extreme 💀</button>
    </div>

    <div id="choiceSection" class="hidden">
        <h3>Truth or Dare?</h3>
        <button class="menu-btn" onclick="getFinal('truth')" style="background:#3498db">Truth 💡</button>
        <button class="menu-btn" onclick="getFinal('dare')" style="background:#27ae60">Dare ⚡</button>
    </div>

    <div id="result" class="task-card hidden"></div>
    <button id="reset" class="hidden menu-btn" onclick="location.reload()" style="background:#7f8c8d">Next Round</button>
</div>

<script>
    let players = [];
    let selectedPlayer = "Self";
    let category = "";
    let mode = "";
    const colors = ["#e91e63", "#9c27b0", "#3f51b5", "#00bcd4", "#4caf50", "#ffeb3b", "#ff9800", "#ff5722"];

    const data = {
        fun: { truth: ["Sabh ton fudu memory?", "Kise te crush hai?"], dare: ["Funny dance karo", "Padosi nu awaaz maro"] },
        danger: { truth: ["Kade police ne fadiye?", "Sab ton bada jhoot?"], dare: ["Mirchi khao", "10 Pushups"] },
        extreme: { truth: ["Darkest secret?", "Kise da phone check karvao"], dare: ["Publicly shout 'I am a fool'", "Call an ex"] }
    };

    function startMode(m) {
        mode = m;
        document.getElementById('modeSelection').classList.add('hidden');
        if(m === 'self') {
            selectedPlayer = "You";
            document.getElementById('catSection').classList.remove('hidden');
        } else {
            document.getElementById('setup').classList.remove('hidden');
        }
    }

    function addPlayer() {
        let name = document.getElementById('pName').value;
        if(name) {
            players.push(name);
            document.getElementById('pName').value = "";
            document.getElementById('pList').innerText = players.join(" • ");
            if(players.length >= 2) document.getElementById('startBtn').style.display = "block";
        }
    }

    function showWheel() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('gameSection').classList.remove('hidden');
        drawWheel();
    }

    function drawWheel() {
        const wheel = document.getElementById('wheel');
        wheel.innerHTML = "";
        const angle = 360 / players.length;
        players.forEach((p, i) => {
            const slice = document.createElement('div');
            slice.className = 'slice';
            slice.style.backgroundColor = colors[i % colors.length];
            slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
            
            // Fixed text alignment for center focus
            const span = document.createElement('span');
            span.style.transform = `skewY(-${90 - angle}deg) rotate(${angle/2}deg)`;
            span.innerText = p;
            slice.appendChild(span);
            wheel.appendChild(slice);
        });
    }

    function spinNow() {
        const wheel = document.getElementById('wheel');
        const randDeg = Math.floor(4000 + Math.random() * 4000);
        wheel.style.transform = `rotate(${randDeg}deg)`;
        
        document.getElementById('selectedDisplay').innerText = "Spinning...";

        setTimeout(() => {
            const actualDeg = randDeg % 360;
            const sliceSize = 360 / players.length;
            const index = Math.floor((360 - (actualDeg % 360)) / sliceSize) % players.length;
            selectedPlayer = players[index];
            
            document.getElementById('selectedDisplay').innerText = "Target: " + selectedPlayer;
            setTimeout(() => {
                document.getElementById('gameSection').classList.add('hidden');
                document.getElementById('catSection').classList.remove('hidden');
            }, 1000);
        }, 4100);
    }

    function setCat(c) {
        category = c;
        document.getElementById('catSection').classList.add('hidden');
        document.getElementById('choiceSection').classList.remove('hidden');
    }

    function getFinal(type) {
        const tasks = data[category][type];
        const task = tasks[Math.floor(Math.random() * tasks.length)];
        const res = document.getElementById('result');
        const shareText = encodeURIComponent(`${selectedPlayer}'s Task: ${task} \n- via DareDrop`);
        
        res.innerHTML = `<strong>${selectedPlayer}</strong>, <br><br>${task}<br>
                        <button class="menu-btn share-btn" onclick="window.open('https://wa.me/?text=${shareText}')">Share on WhatsApp 📱</button>`;
        
        res.classList.remove('hidden');
        document.getElementById('choiceSection').classList.add('hidden');
        document.getElementById('reset').classList.remove('hidden');
    }
</script>

</body>
</html>
