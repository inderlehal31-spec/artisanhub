<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Hub Punjab | ਅਸਲੀ ਪੰਜਾਬੀ ਕਲਾ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Punjabi:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d35400; --dark: #2c3e50; --light: #f9f9f9; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Punjabi', sans-serif; background-color: var(--light); color: #333; line-height: 1.6; }

        /* Navigation */
        nav { background: var(--white); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .nav-links a { text-decoration: none; color: var(--dark); margin-left: 20px; font-weight: 500; }

        /* Hero */
        header { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1200') no-repeat center/cover; height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        
        /* Grid */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; text-align: center; }
        .btn { display: block; background: var(--primary); color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }

        /* Custom Form */
        .order-form { background: var(--white); padding: 30px; border-radius: 12px; max-width: 600px; margin: 50px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .order-form input, .order-form textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .submit-btn { background: var(--dark); color: white; padding: 12px; width: 100%; border: none; cursor: pointer; border-radius: 5px; }
        
        footer { background: var(--dark); color: white; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Artisan Hub</div>
    <div class="nav-links">
        <a href="#products">ਉਤਪਾਦ</a>
        <a href="#contact">ਆਰਡਰ ਕਰੋ</a>
    </div>
</nav>

<header>
    <h1>ਪੰਜਾਬੀ ਵਿਰਸਾ ਤੇ ਕਾਰੀਗਰੀ</h1>
    <p>ਸਿੱਧਾ ਕਾਰੀਗਰਾਂ ਤੋਂ, ਤੁਹਾਡੇ ਘਰ ਤੱਕ।</p>
</header>

<div class="container" id="products">
    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1599521418632-f9a77074154c?w=500" loading="lazy" alt="Phulkari">
            <div class="info">
                <h3>ਸ਼ਾਹੀ ਫੁਲਕਾਰੀ</h3>
                <p>₹1,500</p>
                <a href="https://wa.me/917087806377?text=ਮੈਨੂੰ ਫੁਲਕਾਰੀ ਚਾਹੀਦੀ ਹੈ" class="btn">WhatsApp 'ਤੇ ਆਰਡਰ</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1610701596007-11502861dc43?w=500" loading="lazy" alt="Pottery">
            <div class="info">
                <h3>ਮਿੱਟੀ ਦੇ ਬਰਤਨ</h3>
                <p>₹800</p>
                <a href="https://wa.me/917087806377?text=ਮੈਨੂੰ ਮਿੱਟੀ ਦੇ ਬਰਤਨ ਚਾਹੀਦੇ ਹਨ" class="btn">WhatsApp 'ਤੇ ਆਰਡਰ</a>
            </div>
        </div>
    </div>
</div>

<section id="contact" class="order-form">
    <h2 style="text-align: center;">ਆਰਡਰ ਫਾਰਮ</h2>
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="text" name="name" placeholder="ਤੁਹਾਡਾ ਨਾਮ" required>
        <input type="tel" name="phone" placeholder="ਫੋਨ ਨੰਬਰ" required>
        <textarea name="message" placeholder="ਕਿਹੜਾ ਉਤਪਾਦ ਚਾਹੀਦਾ ਹੈ?" required></textarea>
        <button type="submit" class="submit-btn">ਭੇਜੋ (Submit)</button>
    </form>
</section>

<footer>
    <p>© 2026 Artisan Hub Punjab | ਸਾਰਾ ਹੱਕ ਰਾਖਵਾਂ</p>
</footer>

</body>
</html>
