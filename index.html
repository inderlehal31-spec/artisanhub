<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDrop</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.primary{background:#ff4d6d;color:white;}
.secondary{background:#ffffff;color:#333;}

#dareBox{
margin-top:20px;
padding:20px;
background:white;
color:#333;
border-radius:12px;
font-size:20px;
min-height:80px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:80%;
margin-top:10px;
}

.section{
margin-top:30px;
}

ul{
list-style:none;
padding:0;
}

li{
background:white;
color:#333;
margin:5px;
padding:10px;
border-radius:8px;
}

footer{
margin-top:40px;
padding:10px;
opacity:0.7;
}
</style>
</head>

<body>

<header>DareDrop 🔥</header>

<div class="container">

<select id="category">
<option value="fun">Fun</option>
<option value="friends">Friends</option>
<option value="couple">Couple</option>
<option value="extreme">Extreme</option>
</select>

<br>

<button class="primary" onclick="generateDare()">Generate Dare</button>
<button class="secondary" onclick="saveFav()">❤️ Like</button>

<div id="dareBox">Press Generate</div>

<div class="section">
<h3>Add Your Dare</h3>
<input id="customDare" placeholder="Type dare">
<br>
<button class="primary" onclick="addCustom()">Add Dare</button>
</div>

<div class="section">
<h3>❤️ Favorites</h3>
<ul id="favList"></ul>
</div>

<div class="section">
<h3>📋 History</h3>
<ul id="history"></ul>
</div>

</div>

<footer>Made with ❤️ DareDrop</footer>

<script>

const dares={
fun:["Dance for 30 sec","Sing loudly","Act like robot","Do funny face"],
friends:["Call friend and say I miss you","Tell secret","Imitate friend","Roast friend"],
couple:["Hold hands 1 min","Compliment partner","Eye contact 30 sec","Say love line"],
extreme:["Ice bucket challenge","Eat chilli","50 jumping jacks","Speak truth 5 min"]
};

let currentDare="";

function generateDare(){
let cat=document.getElementById("category").value;
let list=dares[cat];
currentDare=list[Math.floor(Math.random()*list.length)];
document.getElementById("dareBox").innerText=currentDare;
addHistory(currentDare);
}

function addHistory(d){
let li=document.createElement("li");
li.innerText=d;
document.getElementById("history").prepend(li);
}

function saveFav(){
if(currentDare==="") return;
let li=document.createElement("li");
li.innerText=currentDare;
document.getElementById("favList").prepend(li);
}

function addCustom(){
let val=document.getElementById("customDare").value;
if(val==="") return;
dares.fun.push(val);
document.getElementById("customDare").value="";
alert("Added to Fun category");
}

</script>

</body>
</html>
